# MeshKore Quality Gates — markdown-only repo (docs/skills).
# meshkore-quality-gates: v1
# stack: markdown

name: meshkore/quality-gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secrets scan (basic patterns)
        run: |
          ! git log -p | grep -P '(?<![A-Za-z0-9_])(AIza[A-Za-z0-9_-]{30,}|r8_[A-Za-z0-9]{30,}|sk-[A-Za-z0-9_-]{30,}|ghp_[A-Za-z0-9]{30,}|xoxb-[A-Za-z0-9-]{30,})'

      - name: Markdown link check (warn only)
        continue-on-error: true
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
